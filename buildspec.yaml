version: 0.2

env:
  parameter-store:
    DOCKER_REGISTRY_URL: /myapp/docker/registry_url
    DOCKER_USERNAME: /myapp/docker/username
    DOCKER_PASSWORD: /myapp/docker/password

phases:
  install:
    runtime-versions:
      python: 3.11
  pre_build:
    commands:
      - echo "Installing dependencies..."
      - pip install -r requirements.txt
  build:
    commands:
      - echo "Logging into Docker Hub..."
      - echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin
      - echo "Building Docker image..."
      - docker build -t $DOCKER_USERNAME/sample-python-flask-app:latest .
      - echo "Pushing Docker image..."
      - docker push $DOCKER_USERNAME/sample-python-flask-app:latest
  post_build:
    commands:
      - echo "Build and push completed successfully."